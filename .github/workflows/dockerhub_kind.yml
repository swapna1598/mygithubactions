# This is a basic workflow to help you get started with Actions

name: build and push dockerimage to dockerhub

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Docker Login, Build, Tag & Push Action
        # uses: dinushchathurya/build-tag-push-action@223ae959f55676986d37c3528f9d402837d8688c
        uses: dinushchathurya/build-tag-push-action@v2.0.0-rc.1
        with:
    # Username to connect to Docker registry
          username: $ {{ secrets.DOCKERHUB_USERNAME }}
    # Password or token to connect to Docker registry
         password: $ {{ secrets.DOCKERHUB_TOKEN }}
    
    
          
